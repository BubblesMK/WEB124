<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Browser Info Dashboard</title>
</head>
<body>
    <h1>Browser Info Dashboard</h1>
    <p>For this assignment, I created a webpage that displays information about the user's browser and allows the user to enter and save data using a form.</p>

    <!--Form-->
    <form name="dashboard_form">
        <label for="username"><b>Username:</b></label><br>
        <input type="text" id="username" name="username">
        <br>
        <label for="fav_website"><b>Favorite Website:</b></label><br>
        <input type="text" id="fav_website" name="fav_website"> <br><br>
        <input type="submit" id="button" value="Submit"><br><br>
    </form>
        
    <div id="outputmsg"></div>
    <button id="backBtn">Back</button>
    <button id="forwardBtn">Forward</button>

    <script src="dashboard.js"></script>
</body>
</html>
